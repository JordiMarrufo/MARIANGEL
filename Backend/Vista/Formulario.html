<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Invitados</title>
    <link rel="stylesheet" href="../../css/general/style.css" />
    <style>
      .container {
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
      }
      .form-section {
        background: #f5f5f5;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
      }
      button {
        background-color: #4caf50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background-color: #45a049;
      }
      .btn-secondary {
        background-color: #008cba;
      }
      .btn-secondary:hover {
        background-color: #007399;
      }
      .btn-danger {
        background-color: #f44336;
      }
      .btn-danger:hover {
        background-color: #da190b;
      }
      .table-section {
        margin-top: 30px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: left;
      }
      th {
        background-color: #4caf50;
        color: white;
      }
      tr:hover {
        background-color: #f5f5f5;
      }
      .actions {
        display: flex;
        gap: 5px;
      }
      .actions button {
        padding: 5px 10px;
        font-size: 12px;
      }
      h1 {
        text-align: center;
        color: #333;
      }
      h2 {
        color: #333;
        margin-top: 0;
      }
      @media (max-width: 768px) {
        .table-section {
          overflow-x: auto;
        }

        table {
          min-width: 100%;
          font-size: 12px;
        }

        .actions button {
          padding: 3px 6px;
          font-size: 10px;
          white-space: nowrap;
        }

        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          margin-bottom: 15px;
          border: 1px solid #ddd;
          border-radius: 4px;
          padding: 10px;
        }

        td {
          border: none;
          padding: 8px 0;
          display: flex;
          justify-content: space-between;
        }

        td:before {
          content: attr(data-label);
          font-weight: bold;
          width: 100px;
        }

        .actions {
          flex-direction: column;
          width: 100%;
        }

        .actions button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Gestión de Invitados</h1>

      <!-- FORMULARIO -->
      <div class="form-section">
        <h2>Crear Invitado</h2>
        <form id="formularioInvitado">
          <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Nombre completo"
              required
            />
          </div>

          <button type="submit" id="btnSubmit">Crear Invitado</button>
          <button type="button" id="btnLimpiar">Limpiar Formulario</button>
        </form>
      </div>

      <!-- LISTA DE INVITADOS -->
      <div class="table-section">
        <h2>Lista de Invitados</h2>
        <table id="tablaInvitados">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody-invitados">
            <!-- Los invitados se cargarán aquí -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="../../js/invitados.js"></script>
  </body>
</html>

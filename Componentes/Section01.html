<style>
  body {
    margin: 0;
    padding: 0;
  }

  .contenedor {
    width: 50%;
    margin: 0 auto;
    background-color: #f8e3d4;
    height: 800px;
    border-radius: 10px;
    box-sizing: border-box;
    overflow: hidden;
  }

  /* En pantallas menores a 768px (móviles) */
  @media (max-width: 768px) {
    .contenedor {
      width: 100vw;
      height: 400px;
      border-radius: 0;
      margin: 0;
      margin-left: calc(-50vw + 50%);
      padding: 0;
      box-sizing: border-box;
    }
  }

  .contenedor h1 {
    margin: 0;
    padding: 20px;
  }

  .contenedor img {
    margin: 0;
    padding: 0;
  }
</style>

<div class="contenedor">
  <img
    src=""
    alt="       "
    style="
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px 10px 0 0;
      margin: 0;
      padding: 0;
    "
    onerror="this.style.display = 'none'"
  />

  <svg
    width="100%"
    height="200"
    viewBox="0 0 400 200"
    style="display: none; margin: 0; padding: 0;"
    id="svgFallback"
  >
    <rect width="400" height="200" fill="#ddd" />
    <text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#999">
      Imagen no disponible
    </text>
  </svg>

  <script>
    const img = document.querySelector("img");
    const svg = document.getElementById("svgFallback");

    img.addEventListener("error", () => {
      img.style.display = "none";
      svg.style.display = "block";
    });
  </script>
</div>
